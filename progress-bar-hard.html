<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar</title>
  <link rel="stylesheet" href="progress-bar-hard.css" />
</head>
<body>

  <div class="progress">
    <div class="progress__bar" id="bar">
      <span class="progress__label" id="label">0%</span>
    </div>
  </div>

  <button id="increase">Increase</button>
  <button id="decrease">Decrease</button>

  <script src="progress-bar-hard.js"></script>
</body>
</html>
